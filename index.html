<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ronniiiiiiii 🧡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Lato',sans-serif;
  background:#1c0e06;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── MODAL ─────────────────────────────────────────────── */
#apiModal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.78);
  display:flex;align-items:center;justify-content:center;
  z-index:2000;
}
.modal-box{
  background:#fdf5e8;
  border:3px solid #c9803a;
  border-radius:18px;
  padding:40px 36px 32px;
  max-width:400px;width:92%;
  text-align:center;
  box-shadow:0 24px 64px rgba(0,0,0,.6);
}
.modal-box input{
  width:100%;padding:11px 15px;
  border:2px solid #c9803a;border-radius:9px;
  font-size:.95rem;background:#fff9f0;color:#3d1f08;
  outline:none;margin-bottom:18px;font-family:'Lato',sans-serif;
  transition:border-color .2s,box-shadow .2s;
}
.modal-box input:focus{border-color:#e09050;box-shadow:0 0 0 3px rgba(200,128,58,.22);}
.modal-btn{
  background:linear-gradient(135deg,#c9803a,#e2a256);
  color:#fff;border:none;padding:12px 36px;
  border-radius:9px;font-family:'Caveat',cursive;font-size:1.25rem;
  cursor:pointer;box-shadow:0 4px 14px rgba(201,128,58,.45);
  transition:transform .2s,box-shadow .2s;
}
.modal-btn:hover{transform:translateY(-2px);box-shadow:0 7px 20px rgba(201,128,58,.55);}
.modal-question{
  font-family:'Caveat',cursive;font-size:1.55rem;font-weight:700;
  color:#5a2e08;margin-bottom:6px;line-height:1.5;
}
.blank{
  display:inline-block;
  min-width:90px;border-bottom:2px solid #c9803a;
  color:#c9803a;font-style:italic;padding:0 4px;
  vertical-align:bottom;
}
.modal-hint{
  font-size:.78rem;color:#a07848;font-style:italic;
  margin-bottom:20px;line-height:1.5;
}
.modal-err{
  display:none;font-family:'Caveat',cursive;font-size:1rem;
  color:#b83030;margin-bottom:10px;
}

/* ── FAIRY LIGHTS ──────────────────────────────────────── */
.fairy-header{
  background:#140800;
  padding:24px 12px 18px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.fairy-header::before{
  content:'';
  position:absolute;
  top:26px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 2%,#4a2c0a 8%,#4a2c0a 92%,transparent 98%);
}
.lights-row{
  display:inline-flex;
  align-items:flex-end;
  gap:4px;
  flex-wrap:wrap;
  justify-content:center;
  position:relative;
}
.bulb-wrap{display:flex;flex-direction:column;align-items:center;}
.bulb-stem{width:2px;background:#4a2c0a;}
.bulb{
  width:36px;height:44px;
  border-radius:50% 50% 44% 44%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Caveat',cursive;font-size:1.35rem;font-weight:700;
  color:rgba(255,255,255,.92);
  position:relative;
  animation:bulbFlicker 2.4s ease-in-out infinite;
}
.bulb::after{
  content:'';position:absolute;bottom:-5px;left:50%;
  transform:translateX(-50%);
  width:16px;height:7px;
  background:#5a3a12;border-radius:0 0 5px 5px;
}
@keyframes bulbFlicker{
  0%,100%{opacity:1;filter:brightness(1);}
  45%{opacity:.75;filter:brightness(.8);}
  50%{opacity:1;filter:brightness(1.1);}
  80%{opacity:.85;filter:brightness(.9);}
}
.b-amber{background:#ffb347;box-shadow:0 0 10px 4px rgba(255,179,71,.65),0 0 22px 8px rgba(255,140,0,.3);}
.b-rose {background:#ff9b9b;box-shadow:0 0 10px 4px rgba(255,155,155,.65),0 0 22px 8px rgba(255,80,80,.3);}
.b-gold {background:#ffd700;box-shadow:0 0 10px 4px rgba(255,215,0,.7),0 0 22px 8px rgba(255,190,0,.35);}
.b-peach{background:#ffcba4;box-shadow:0 0 10px 4px rgba(255,203,164,.65),0 0 22px 8px rgba(255,155,60,.3);}
.b-cream{background:#fff8dc;box-shadow:0 0 10px 4px rgba(255,248,220,.75),0 0 22px 8px rgba(255,220,100,.35);}

/* ── PAGE SUBTITLE ─────────────────────────────────────── */
.page-sub{
  text-align:center;padding:22px 20px 6px;
  font-family:'Caveat',cursive;font-size:1.35rem;
  color:#d49560;letter-spacing:.5px;
}

/* ── CORKBOARD ─────────────────────────────────────────── */
.board-outer{
  max-width:1020px;margin:16px auto 70px;
  padding:6px;
  background:linear-gradient(145deg,#6b3d10,#8b5218,#6b3d10);
  border-radius:18px;
  box-shadow:0 28px 70px rgba(0,0,0,.55),0 0 0 3px #3d2008;
}
.board-inner{
  background:#c47e3a;
  background-image:
    radial-gradient(circle,rgba(0,0,0,.18) 1px,transparent 1px),
    radial-gradient(circle,rgba(255,220,150,.06) 2px,transparent 2px);
  background-size:9px 9px, 18px 18px;
  background-position:0 0, 4px 4px;
  border-radius:13px;
  padding:28px 22px 32px;
  box-shadow:inset 0 3px 10px rgba(0,0,0,.3),inset 0 -2px 6px rgba(255,180,60,.1);
}
.env-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:22px;
}
@media(min-width:600px){.env-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.env-grid{grid-template-columns:repeat(4,1fr);}}

/* ── ENVELOPE ──────────────────────────────────────────── */
.env-wrap{
  display:flex;flex-direction:column;align-items:center;
  position:relative;padding-top:12px;
}
.pushpin{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:20px;height:20px;border-radius:50%;z-index:5;
  background:radial-gradient(circle at 35% 35%,#ff7070,#c01818);
  box-shadow:0 2px 5px rgba(0,0,0,.45),inset 0 1px 2px rgba(255,255,255,.35);
}
.pushpin::after{
  content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  width:5px;height:10px;background:#999;border-radius:0 0 3px 3px;
}
.env-card{
  width:100%;
  border-radius:8px 8px 6px 6px;
  background:var(--ec,#fde3c8);
  cursor:pointer;
  position:relative;
  box-shadow:2px 5px 14px rgba(0,0,0,.28);
  transition:transform .22s,box-shadow .22s;
  perspective:600px;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.env-card:hover{
  transform:translateY(-5px) rotate(-1.5deg);
  box-shadow:4px 10px 24px rgba(0,0,0,.38);
}
.env-flap{
  width:100%;
  padding-bottom:50%;
  position:relative;
  overflow:hidden;
  transform-origin:top center;
  transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.4,0,.2,1);
  border-radius:8px 8px 0 0;
}
.env-flap::before{
  content:'';position:absolute;inset:0;
  background:var(--ef,#f5cfa8);
  clip-path:polygon(0 0,100% 0,50% 100%);
}
.env-card.is-open .env-flap{transform:rotateX(-175deg);}
.env-body{
  padding:10px 10px 13px;
  display:flex;flex-direction:column;align-items:center;gap:7px;
  position:relative;
}
.env-body::before,.env-body::after{
  content:'';position:absolute;
  width:145%;height:2px;
  background:var(--el,rgba(0,0,0,.07));
  top:0;pointer-events:none;
}
.env-body::before{left:-23%;transform:rotate(34deg);transform-origin:left top;}
.env-body::after{right:-23%;transform:rotate(-34deg);transform-origin:right top;}
.wax-seal{font-size:1.7rem;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.22));}
.env-label{
  font-family:'Caveat',cursive;font-size:.82rem;font-weight:600;
  color:#5a2e08;text-align:center;line-height:1.35;
}
.env-ribbon{
  display:none;
  position:absolute;top:6px;right:-5px;
  background:linear-gradient(135deg,#ffaabe,#ffccd6);
  color:#6b0020;font-size:.62rem;font-family:'Caveat',cursive;font-weight:700;
  padding:3px 9px;border-radius:4px;
  transform:rotate(14deg);
  box-shadow:0 2px 6px rgba(0,0,0,.22);z-index:4;
  white-space:nowrap;
}
.env-wrap.opened .env-ribbon{display:block;}

/* ── SECRET ENVELOPE ───────────────────────────────────── */
.secret-section{
  display:none;
  text-align:center;
  padding:28px 0 6px;
  animation:secretAppear 1.8s ease both;
}
@keyframes secretAppear{
  0%{opacity:0;transform:translateY(28px);}
  100%{opacity:1;transform:translateY(0);}
}
.secret-hint{
  font-family:'Caveat',cursive;font-size:1.2rem;color:#5a2e08;
  margin-bottom:18px;
  animation:secretShimmer 2s ease-in-out infinite;
}
@keyframes secretShimmer{
  0%,100%{text-shadow:0 0 8px rgba(255,215,0,.55);}
  50%{text-shadow:0 0 18px rgba(255,215,0,1),0 0 36px rgba(255,160,0,.55);}
}
.secret-card-wrap{
  display:inline-flex;flex-direction:column;align-items:center;
  max-width:240px;
}
.secret-card-wrap .env-card{
  animation:goldenGlow 2s ease-in-out infinite;
}
@keyframes goldenGlow{
  0%,100%{box-shadow:2px 5px 14px rgba(255,210,0,.4),0 0 24px rgba(255,180,0,.3);}
  50%{box-shadow:2px 5px 28px rgba(255,210,0,.85),0 0 48px rgba(255,180,0,.6);}
}

/* ── LETTER OVERLAY ────────────────────────────────────── */
#letterOverlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(14,6,0,.86);
  z-index:800;
  align-items:center;justify-content:center;
  padding:20px;
  overflow-y:auto;
}
#letterOverlay.open{display:flex;}
.letter-modal{
  max-width:540px;width:100%;
  display:flex;flex-direction:column;align-items:center;
  animation:modalIn .45s ease both;
}
@keyframes modalIn{
  from{opacity:0;transform:translateY(28px);}
  to{opacity:1;transform:translateY(0);}
}
.mini-env{
  width:110px;height:72px;
  position:relative;perspective:500px;
  margin-bottom:-2px;flex-shrink:0;
}
.mini-env-body{
  width:100%;height:100%;
  border-radius:5px 5px 7px 7px;
}
.mini-env-flap{
  position:absolute;top:0;left:0;right:0;height:52%;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top center;
  animation:miniFlap .7s cubic-bezier(.4,0,.2,1) .2s both;
}
@keyframes miniFlap{
  from{transform:rotateX(0);}
  to{transform:rotateX(-168deg);}
}
.letter-card{
  background:#fdf8ee;
  border-radius:0 0 8px 8px;
  padding:26px 28px 22px;
  width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.42);
  position:relative;
  animation:letterUp .5s ease .5s both;
}
@keyframes letterUp{
  from{opacity:0;transform:translateY(18px);}
  to{opacity:1;transform:translateY(0);}
}
.letter-card::before{
  content:'';position:absolute;inset:0;border-radius:0 0 8px 8px;
  background-image:repeating-linear-gradient(
    transparent,transparent 27px,
    rgba(160,120,80,.18) 27px,rgba(160,120,80,.18) 28px
  );
  background-position:0 38px;
  pointer-events:none;
}
.letter-envelope-label{
  font-family:'Caveat',cursive;font-size:.95rem;color:#b87030;
  margin-bottom:14px;opacity:.8;font-style:italic;
}
.letter-body{
  font-family:'Caveat',cursive;font-size:1.18rem;
  color:#3a1e08;line-height:1.92;
  white-space:pre-wrap;min-height:80px;
}
.dots{display:flex;gap:9px;justify-content:center;padding:22px 0;}
.dots span{
  width:11px;height:11px;border-radius:50%;background:#c9803a;
  animation:dotBounce 1.2s ease-in-out infinite;
}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dotBounce{
  0%,80%,100%{transform:translateY(0);opacity:.55;}
  40%{transform:translateY(-13px);opacity:1;}
}
.seal-btn{
  margin-top:18px;
  background:transparent;border:2px solid #c9803a;color:#c9803a;
  padding:9px 22px;border-radius:22px;
  font-family:'Caveat',cursive;font-size:1.15rem;
  cursor:pointer;transition:background .2s,color .2s;
}
.seal-btn:hover{background:#c9803a;color:#fff;}

/* ── MUSIC BUTTON ──────────────────────────────────────── */
#musicBtn{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#c9803a,#e2a256);
  border:none;font-size:1.4rem;cursor:pointer;
  box-shadow:0 4px 18px rgba(200,128,58,.5);
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s;
}
#musicBtn:hover{transform:scale(1.1);}
#musicBtn.playing{animation:musicPulse 1.6s ease-in-out infinite;}
@keyframes musicPulse{
  0%,100%{box-shadow:0 4px 18px rgba(200,128,58,.5);}
  50%{box-shadow:0 4px 34px rgba(200,128,58,.9),0 0 48px rgba(255,180,80,.38);}
}
</style>
</head>
<body>

<!-- ── MODAL ──────────────────────────────────────────────── -->
<div id="apiModal">
  <div class="modal-box">
    <h2 style="font-family:'Caveat',cursive;font-size:1.9rem;color:#8b4010;margin-bottom:14px;">
      One question first 🧡
    </h2>
    <p class="modal-question">
      I Likeeeeeeee youuuuuuuu RONNIIIIIIII <span class="blank" id="blankWord">_____________</span>
    </p>
    <p class="modal-hint">
      ( Mare biju kaik lakhvu tu but ee hu aavine kav 🧡 )
    </p>
    <input type="text" id="loveInput" placeholder="your answer..."
           autocomplete="off" spellcheck="false"
           onkeydown="if(event.key==='Enter')checkAnswer()"
           oninput="document.getElementById('blankWord').textContent=this.value||'_____________'">
    <div class="modal-err" id="wrongMsg">hmm… try again 🥺</div>
    <button class="modal-btn" onclick="checkAnswer()">that's my answer 🧡</button>
  </div>
</div>

<!-- ── FAIRY LIGHTS ────────────────────────────────────────── -->
<div class="fairy-header">
  <div class="lights-row" id="lightsRow"></div>
</div>

<p class="page-sub">For Ronniiiiiiii 🧡 — open when you need it</p>

<!-- ── CORKBOARD ──────────────────────────────────────────── -->
<div class="board-outer">
  <div class="board-inner">
    <div class="env-grid" id="envGrid"></div>
    <div class="secret-section" id="secretSection">
      <div class="secret-hint">✨ You opened them all… there's one more 🌟 ✨</div>
      <div class="secret-card-wrap" id="secretWrap"></div>
    </div>
  </div>
</div>

<!-- ── LETTER OVERLAY ─────────────────────────────────────── -->
<div id="letterOverlay" onclick="overlayClick(event)">
  <div class="letter-modal">
    <div class="mini-env">
      <div class="mini-env-body" id="miniEnvBody"></div>
      <div class="mini-env-flap" id="miniEnvFlap"></div>
    </div>
    <div class="letter-card">
      <div class="letter-envelope-label" id="modalLabel"></div>
      <div class="letter-body" id="letterBody"></div>
    </div>
    <button class="seal-btn" onclick="closeLetter()">💌 seal it back</button>
  </div>
</div>

<!-- ── MUSIC ───────────────────────────────────────────────── -->
<div style="position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;align-items:flex-end;gap:6px;z-index:900;">
  <span id="musicLabel" style="display:none;font-family:'Caveat',cursive;font-size:.85rem;color:#e2a256;
        background:rgba(28,14,6,.85);padding:3px 10px;border-radius:12px;white-space:nowrap;">
    ♪ Wildflower — Billie Eilish
  </span>
  <button id="musicBtn" onclick="toggleMusic()">🎵</button>
</div>

<script>
/* ── DATA ──────────────────────────────────────────────────── */
const ENVELOPES = [
  {id:0,label:"Open when you feel unappreciated at work",  color:"#fde3c8",flap:"#f2ccac",line:"rgba(0,0,0,.07)"},
  {id:1,label:"Open when you feel like giving up",          color:"#ffd6d6",flap:"#f5b8b8",line:"rgba(0,0,0,.06)"},
  {id:2,label:"Open when you miss me",                     color:"#fce4d6",flap:"#f5ccbc",line:"rgba(0,0,0,.07)"},
  {id:3,label:"Open when your dream job feels far away",   color:"#d9edcc",flap:"#c4e0b0",line:"rgba(0,0,0,.06)"},
  {id:4,label:"Open when you need a reminder of how amazing you are",
                                                            color:"#cce4f9",flap:"#afd2f0",line:"rgba(0,0,0,.06)"},
  {id:5,label:"Open when you just need a hug",             color:"#f9d5e8",flap:"#f2b8d5",line:"rgba(0,0,0,.06)"},
  {id:6,label:"Open when you feel like you're not enough", color:"#e8d5f9",flap:"#d5b8f2",line:"rgba(0,0,0,.06)"},
  {id:7,label:"Open when you need to smile",               color:"#fef3c2",flap:"#fde87a",line:"rgba(0,0,0,.06)"},
];
const SECRET = {id:8,label:"Open when you've read them all… 🌟",color:"#fff5c0",flap:"#ffe865",line:"rgba(0,0,0,.06)"};

const FALLBACK = {
  0:`Hi Ronniii, tu best chhe oky please remember this every time and thay koik var loko ne khabar na pade apde ketli mehnat kari chhe bu bu but i know that tu bou hard work kare chhe and ena mate i am always happy for you.\n\nYarrr tu ketlu manage kari ley ekla j mast team manage kare, mane manage kare , family and most important I lllloooooooo naaa I like youuuuu ronnniiiiiiii tuuu booo j mast chhee tu badhu j perfect kare chhe .\n\nThis job is a chapter, not the whole story. aa job khali survival mate chhe baki mast apanane biji IT ni job mali jashe joje tension nai leenekaaaa my loveeee 🥰😘.\n\nForever yours 🧡`,

  1:`Hey. Don't. Not yet. I knwo aa thodu frustrating chhe but apda dreams b to mota mota chhe neee to thoda kam kar lete hee reeeee 😍💗.\n\nYarr roniiiii tu to maru motivation chhe tu roj atli mehnat kare to ee bija ghana badha loko ne inspire kare roj roj roj and mane to khas haaa so my love give up nai karnekaaa 💕❤️\n\nThis isn't where it ends. It's just a hard stretch. And I'm not going anywhere — I'm going to be right here reading every page of this with you.😘💚\n\nForever yours 🧡`,

  2:`I miss you too. Like, specifically — the specific weight of your head on my shoulder🥰😍. The way you reach over and fix something on me for no reason. Tu roj je mane savare nava nava name thi bolave mane to bou man thay chhe ke hu jaldi thi tya aai jav tari pase and mast apde sathe raieee but ye kambakt jinmedariya but koi niiii hu to tane stalk kari shaku roj and ee hu karto j riash❤️💖\n\nTU ee chhe jene hu 10 ni vache b tane j joish, 100 ni vache b tane j jova magish, 1000 ni vache b tane j vicharish, 10000 ni vache b tane j miss karish iiii lloooo nai nai naiaiii hamna naiii mane tya aavi ne kevu chhe ❤️💖\n\nCome back to me soon. Or just text me something random. I need it.\n\nForever yours 🧡`,

  3:`I know it feels far. I know you've applied and waited and heard nothing and applied again and it is exhausting and demoralizing and some days I think you probably wonder if it's even worth it. That's a real feeling and I'm not going to pretend it isn't.\n\nBut here's the thing — you are genuinely, actually qualified for what you want. Not "you'll grow into it" qualified. You already are it. The work ethic, the people skills, the patience you have that most people in your field don't even have after years of doing it. Someone is going to read your name on an application one day and think oh, finally. And then that's going to be your whole life.\n\nDon't stop applying. Don't let the silence convince you it's not coming. It is. The right door just hasn't opened yet.\n\nForever yours 🧡`,

/* ── STATE ─────────────────────────────────────────────────── */
const cache = {};
const opened = new Set();
let currentId = null;

/* ── MODAL ─────────────────────────────────────────────────── */
function checkAnswer(){
  const raw = document.getElementById('loveInput').value.trim().toLowerCase();
  if(raw.includes('like you too') || raw === 'too'){
    sessionStorage.setItem('unlocked','1');
    document.getElementById('apiModal').style.display = 'none';
  } else {
    const err = document.getElementById('wrongMsg');
    const inp = document.getElementById('loveInput');
    err.style.display = 'block';
    inp.style.borderColor = '#b83030';
    inp.focus();
    setTimeout(()=>{ err.style.display='none'; inp.style.borderColor=''; }, 2200);
  }
}
if(sessionStorage.getItem('unlocked')){
  document.getElementById('apiModal').style.display = 'none';
}

/* ── FAIRY LIGHTS ──────────────────────────────────────────── */
(function(){
  const text = 'Ronniiiiiiii 🧡';
  const colors = ['b-amber','b-rose','b-gold','b-peach','b-cream'];
  const stems = [14,18,12,20,10,16,22,12,18,14,20,12,16,18,10];
  const row = document.getElementById('lightsRow');
  [...text].forEach((ch,i)=>{
    const wrap = document.createElement('div');
    wrap.className = 'bulb-wrap';
    const stem = document.createElement('div');

    wrap.appendChild(stem);
    wrap.appendChild(bulb);
    row.appendChild(wrap);
  });
})();

/* ── RENDER ENVELOPES ──────────────────────────────────────── */
function makeCard(env, container){
  const wrap = document.createElement('div');
  wrap.className = 'env-wrap';
  wrap.id = `wrap-${env.id}`;
  wrap.innerHTML = `
    <div class="pushpin"></div>
    <div class="env-card" id="card-${env.id}"
         style="--ec:${env.color};--ef:${env.flap};--el:${env.line}"
         onclick="openEnvelope(${env.id})">
      <div class="env-flap"></div>
      <div class="env-body">
        <div class="wax-seal">${env.id===8?'⭐':'🔴'}</div>
        <div class="env-label">${env.label}</div>
      </div>
    </div>
    <div class="env-ribbon">opened 💛</div>`;
  container.appendChild(wrap);
}
ENVELOPES.forEach(e => makeCard(e, document.getElementById('envGrid')));
makeCard(SECRET, document.getElementById('secretWrap'));

/* ── OPEN / CLOSE ──────────────────────────────────────────── */
async function openEnvelope(id){
  const env = id === 8 ? SECRET : ENVELOPES[id];
  currentId = id;

  document.getElementById(`card-${id}`).classList.add('is-open');

  const miniBody = document.getElementById('miniEnvBody');
  const miniFlap = document.getElementById('miniEnvFlap');
  miniBody.style.background = env.color;
  miniFlap.style.background = env.flap;
  miniFlap.style.animation = 'none';
  miniFlap.offsetHeight;
  miniFlap.style.animation = '';

  document.getElementById('modalLabel').textContent = env.label;
  document.getElementById('letterOverlay').classList.add('open');

  const body = document.getElementById('letterBody');
  if(cache[id]){
    body.textContent = cache[id];
  } else {
    cache[id] = FALLBACK[id] ?? FALLBACK[0];
    body.textContent = cache[id];
  }

  if(!opened.has(id)){
    opened.add(id);
    document.getElementById(`wrap-${id}`).classList.add('opened');
    if(id !== 8 && opened.size === 8){
      setTimeout(revealSecret, 1200);
    }
  }
}

function closeLetter(){
  document.getElementById('letterOverlay').classList.remove('open');
  currentId = null;
}
function overlayClick(e){
  if(e.target === document.getElementById('letterOverlay')) closeLetter();
}

/* ── SECRET ────────────────────────────────────────────────── */
function revealSecret(){
  const sec = document.getElementById('secretSection');
  sec.style.display = 'block';
  setTimeout(()=> sec.scrollIntoView({behavior:'smooth',block:'center'}), 100);
}

/* ── MUSIC ─────────────────────────────────────────────────── */
let actx, masterGain, reverbNode, compressor;
let playing = false, schedTimer = null;
let beatTime = 0, beatIdx = 0;

// Wildflower — Billie Eilish (piano approximation, D major, ~65 BPM)
const VOICE_A = [
  587.33,493.88,440.00,369.99,  // D5 B4 A4 F#4
  392.00,440.00,493.88,587.33,  // G4 A4 B4 D5
  659.26,587.33,493.88,440.00,  // E5 D5 B4 A4
  392.00,369.99,329.63,293.66,  // G4 F#4 E4 D4
  440.00,493.88,587.33,493.88,  // A4 B4 D5 B4
  440.00,392.00,369.99,329.63,  // A4 G4 F#4 E4
  293.66,329.63,369.99,440.00,  // D4 E4 F#4 A4
  493.88,587.33,440.00,392.00,  // B4 D5 A4 G4
];
const VOICE_B = [
  293.66,0,246.94,0,
  196.00,0,220.00,0,
  293.66,0,220.00,0,
  196.00,0,164.81,0,
  220.00,0,246.94,0,
  220.00,0,196.00,0,
  164.81,0,220.00,0,
  246.94,0,196.00,0,
];
const BEAT = 0.46;

function buildAudio(){
  actx = new (window.AudioContext||window.webkitAudioContext)();
  compressor = actx.createDynamicsCompressor();
  compressor.threshold.value = -14;
  compressor.ratio.value = 4;
  compressor.connect(actx.destination);
  masterGain = actx.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(compressor);
  const delay = actx.createDelay(.6);
  delay.delayTime.value = .28;
  const fb = actx.createGain(); fb.gain.value = .32;
  const wet = actx.createGain(); wet.gain.value = .38;
  delay.connect(fb); fb.connect(delay);
  delay.connect(wet); wet.connect(masterGain);
  reverbNode = delay;
}

function scheduleNotes(){
  if(!playing) return;
  while(beatTime < actx.currentTime + 0.5){
    const i = beatIdx % VOICE_A.length;
    playNote(VOICE_A[i], beatTime, BEAT*.86, .095);
    const bf = VOICE_B[i];
    if(bf > 0) playNote(bf, beatTime, BEAT*.70, .048);
    beatTime += BEAT;
    beatIdx++;
  }
  schedTimer = setTimeout(scheduleNotes, 120);
}

function playNote(freq, t, dur, vol){
  const osc = actx.createOscillator();
  const g = actx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = freq;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.025);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g); g.connect(masterGain); g.connect(reverbNode);
  osc.start(t); osc.stop(t + dur + .06);
}

function toggleMusic(){
  if(!actx) buildAudio();
  if(actx.state === 'suspended') actx.resume();
  const btn = document.getElementById('musicBtn');
  const lbl = document.getElementById('musicLabel');
  if(playing){
    playing = false;
    clearTimeout(schedTimer);
    masterGain.gain.cancelScheduledValues(actx.currentTime);
    masterGain.gain.setValueAtTime(masterGain.gain.value, actx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0, actx.currentTime + 1.4);
    btn.textContent = '🎵'; btn.classList.remove('playing'); lbl.style.display='none';
  } else {
    playing = true;
    beatTime = actx.currentTime + .1;
    masterGain.gain.cancelScheduledValues(actx.currentTime);
    masterGain.gain.setValueAtTime(0, actx.currentTime);
    masterGain.gain.linearRampToValueAtTime(.55, actx.currentTime + 1.8);
    scheduleNotes();
    btn.textContent = '🔇'; btn.classList.add('playing'); lbl.style.display='block';
  }
}
